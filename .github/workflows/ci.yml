name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run no-platform-drift check
        run: ./scripts/check-no-platform-drift.sh

  package-tests:
    # macos-26 is the first image with Xcode >= 26.5, the floor set by
    # IPHONEOS_DEPLOYMENT_TARGET = 26.5 (macos-15 tops out at Xcode 26.3).
    runs-on: macos-26
    strategy:
      # One package's runner-speed flake must not cancel (and mask) the others.
      fail-fast: false
      matrix:
        include:
          # Multi-product packages get per-product autogenerated schemes; only
          # the "-Package" scheme carries a test action.
          - package: ParallaxCore
            scheme: ParallaxCore-Package
          - package: ParallaxJellyfin
            scheme: ParallaxJellyfin
          - package: ParallaxFileBrowse
            scheme: ParallaxFileBrowse
          - package: ParallaxPlayback
            scheme: ParallaxPlayback-Package
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # latest-stable tracks the runner image instead of rotting like a
          # hard pin; the >= 26.5 floor comes from the runs-on image choice.
          xcode-version: latest-stable
      - name: Run ${{ matrix.package }} tests
        # Packages declare iOS/tvOS only — no macOS baseline — so tests run in
        # the iOS Simulator, never as host `swift test`. Real-Keychain suites
        # skip themselves on unentitled test hosts (KeychainEntitlementProbe).
        # The device is discovered from the image's own inventory instead of
        # hardcoding a model name that rots when the simulator lineup rotates.
        working-directory: Packages/${{ matrix.package }}
        env:
          # Forwarded into the simulator test host as CI= (xcodebuild strips the
          # TEST_RUNNER_ prefix); the live-VLC-decode suite skips itself on it.
          TEST_RUNNER_CI: 'true'
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E '^ +iPhone' | head -1 | sed -E 's/^ +//; s/ \(.*//')
          echo "Testing on simulator: ${DEVICE}"
          xcodebuild test \
            -scheme ${{ matrix.scheme }} \
            -destination "platform=iOS Simulator,name=${DEVICE}"

  app-build:
    runs-on: macos-26
    needs: [drift-check, package-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build app
        # Generic destination builds against the iOS Simulator SDK without
        # requiring a specific simulator model — robust to runner image changes.
        run: |
          xcodebuild build \
            -project Parallax.xcodeproj \
            -scheme Parallax \
            -destination 'generic/platform=iOS Simulator'

  tvos-build:
    runs-on: macos-26
    needs: [drift-check, package-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build app for tvOS Simulator
        run: |
          xcodebuild build \
            -project Parallax.xcodeproj \
            -scheme Parallax \
            -destination 'generic/platform=tvOS Simulator'
