name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run no-platform-drift check
        run: ./scripts/check-no-platform-drift.sh

  package-tests:
    runs-on: macos-15
    strategy:
      matrix:
        package: [ParallaxCore, ParallaxJellyfin, ParallaxFileBrowse, ParallaxPlayback]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Run ${{ matrix.package }} tests
        run: swift test --package-path Packages/${{ matrix.package }}

  app-build:
    runs-on: macos-15
    needs: [drift-check, package-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Build app
        # Generic destination builds against the iOS Simulator SDK without
        # requiring a specific simulator model — robust to runner image changes.
        run: |
          xcodebuild build \
            -project Parallax.xcodeproj \
            -scheme Parallax \
            -destination 'generic/platform=iOS Simulator'
